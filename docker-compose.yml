version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: task-family-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_family
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: task-family-adminer
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - postgres

  redis:
    image: redis:7
    container_name: task-family-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./packages/backend
    container_name: task-family-backend
    env_file:
      - ./packages/backend/.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    volumes:
      - ./packages/backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data: