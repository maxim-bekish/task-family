services:
  postgres:
    image: postgres:15
    container_name: task-family-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_family
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: task-family-adminer
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - postgres

  redis:
    image: redis:7
    container_name: task-family-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: task-family-backend
    env_file:
      - ./packages/backend/.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/shared:/app/packages/shared
      - ./packages/backend/prisma:/app/packages/backend/prisma
      - ./packages/backend/prisma.config.ts:/app/packages/backend/prisma.config.ts:ro
      - ./packages/backend/tsconfig.json:/app/packages/backend/tsconfig.json:ro
      # Не монтируем /app/node_modules: анонимный том один раз создаётся пустым и навсегда
      # перекрывает node_modules из образа — пропадают линки workspace (@task-family/shared).

volumes:
  postgres_data:
  redis_data: